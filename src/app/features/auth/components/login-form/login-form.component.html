<div class="login-form">

  <input
    type="text"
    name="usernameOrEmail"
    placeholder="Username or Email"
    [(ngModel)]="loginRequest.usernameOrEmail"
  />

  <input
    type="password"
    name="password"
    placeholder="Password"
    [(ngModel)]="loginRequest.password"
  />

  <button
    type="button"
    (click)="onSubmit()"
    [disabled]="loading">

    {{ loading ? 'Logging in...' : 'Login' }}

  </button>

  <p *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

</div>
